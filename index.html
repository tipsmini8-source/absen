<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>Absensi Relawan MBG</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Arial,sans-serif;

  background:#f5f5f5;

  padding:20px;

}

.container{

  max-width:420px;

  margin:auto;

  background:white;

  padding:24px;

  border-radius:20px;

  box-shadow:
  0 4px 20px rgba(0,0,0,0.08);

}

h2{

  text-align:center;

  margin-bottom:20px;

  font-size:24px;

}

select,
input,
button{

  width:100%;

  padding:16px;

  margin-top:14px;

  border-radius:12px;

  border:1px solid #ddd;

  font-size:16px;

}

select,
input{

  background:white;

}

button{

  border:none;

  font-weight:bold;

  font-size:18px;

  cursor:pointer;

  background:#111;

  color:white;

  transition:0.2s;

}

button:active{

  transform:scale(0.98);

}

#hasil{

  margin-top:18px;

  text-align:center;

  font-weight:bold;

  font-size:15px;

  line-height:1.5;

  word-break:break-word;

}

.logo{

  text-align:center;

  font-size:42px;

  margin-bottom:10px;

}

.subtitle{

  text-align:center;

  color:#666;

  margin-bottom:20px;

  font-size:14px;

}

</style>
</head>

<body>
<div class="container">
  <div class="logo">
🍱
</div>

<h2>
Absensi Relawan MBG
</h2>

<div class="subtitle">
Sistem Absensi Relawan Dapur
</div>

<select id="divisi">
  <option value="">Pilih Divisi</option>
</select>

<select id="nama">
  <option value="">Pilih Nama</option>
</select>

<input type="password"
id="pin"
placeholder="PIN">

<button
onclick="absen()"
id="btnAbsen">

Loading...

</button>

<div id="hasil"></div>

<script>

const url =
"https://script.google.com/macros/s/AKfycbz7SDMxpQ-Z5GxHSYsXkduxlhxvEK2lsjM5OseWfgtE6ZMooSHjtXQjTzTnf3GrFWWppg/exec";


// ======================
// LOAD RELAWAN
// ======================

async function loadRelawan(){

  try{

    const response =
      await fetch(url);

    const data =
      await response.json();

    window.relawanData = data;

    // ======================
    // DIVISI UNIK
    // ======================

    const divisiUnik =
      [...new Set(
        data.map(r => r.divisi)
      )];

    const divisiSelect =
      document.getElementById("divisi");

    divisiSelect.innerHTML =
      '<option value="">Pilih Divisi</option>';

    divisiUnik.forEach(divisi => {

      const option =
        document.createElement("option");

      option.value = divisi;
      option.text = divisi;

      divisiSelect.appendChild(option);

    });

  }

  catch(error){

    document.getElementById("hasil")
      .innerHTML =
      "Gagal load relawan";

  }

}
loadRelawan();

  async function updateTombol(){

  const nama =
    document.getElementById("nama").value;

  const tombol =
    document.getElementById("btnAbsen");

  if(!nama){

    tombol.innerHTML =
      "Pilih Nama";

    return;

  }

  try{

    const response =
      await fetch(

        url +
        "?cek=" +
        encodeURIComponent(nama)

      );

    const hasil =
      await response.text();

    if(
      hasil === "BELUM_PULANG"
    ){

      tombol.innerHTML =
        "🔴 Absen Pulang";

    }

    else{

      tombol.innerHTML =
        "🟢 Absen Masuk";

    }

  }

  catch(error){

    tombol.innerHTML =
      "⚠️ Error";

  }

}
  
document
.getElementById("divisi")
.addEventListener("change", function(){

  const divisiDipilih =
    this.value;

  const namaSelect =
    document.getElementById("nama");

  namaSelect.innerHTML =
    '<option value="">Pilih Nama</option>';

  const filtered =
    window.relawanData.filter(
      r => r.divisi === divisiDipilih
    );

  filtered.forEach(relawan => {

    const option =
      document.createElement("option");

    option.value =
      relawan.nama;

    option.text =
      relawan.nama;

    namaSelect.appendChild(option);

  });

});

// ======================
// ABSEN
// ======================

async function absen(){

  const nama =
    document.getElementById("nama").value;

  const pin =
    document.getElementById("pin").value;

  if(!nama || !pin){

    alert("Lengkapi data");

    return;

  }

  document.getElementById("hasil")
    .innerHTML =
    "Memproses...";


  // ======================
  // CEK STATUS
  // ======================

  let status = "Masuk";

  try{

    const response =
      await fetch(

        url +
        "?cek=" +
        encodeURIComponent(nama)

      );

    const hasil =
      await response.text();

    if(
      hasil === "BELUM_PULANG"
    ){

      status = "Pulang";

    }

  }

  catch(error){

  }


  // ======================
  // GPS
  // ======================

  navigator.geolocation.getCurrentPosition(

    async function(position){

      const lokasi =

        position.coords.latitude +
        "," +
        position.coords.longitude;

      try{

        const response =
          await fetch(url,{

            method:"POST",

            body:JSON.stringify({

              nama:nama,
              pin:pin,
              status:status,
              lokasi:lokasi

            })

          });

        const hasil =
          await response.text();

        document.getElementById("hasil")
          .innerHTML = hasil;

        updateTombol();

      }

      catch(error){

        document.getElementById("hasil")
          .innerHTML =
          "Gagal kirim data";

      }

    },

    function(error){

      document.getElementById("hasil")
        .innerHTML =
        "GPS tidak diizinkan";

    },

    {
      enableHighAccuracy:true
    }

  );

}

  document
.getElementById("nama")
.addEventListener("change", function(){

  updateTombol();

});
  
</script>
</div>
</body>
</html>
