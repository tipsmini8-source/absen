<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Absensi Relawan MBG</title>

<style>

body{
  font-family: Arial;
  max-width:400px;
  margin:40px auto;
  padding:20px;
}

select,input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  box-sizing:border-box;
}

button{
  cursor:pointer;
}

#hasil{
  margin-top:20px;
  font-weight:bold;
}

</style>
</head>

<body>

<h2>Absensi Relawan MBG</h2>

<select id="divisi">
  <option value="">Pilih Divisi</option>
</select>

<select id="nama">
  <option value="">Pilih Nama</option>
</select>

<input type="password"
id="pin"
placeholder="PIN">

<button onclick="absen('Masuk')">
Absen Masuk
</button>

<button onclick="absen('Pulang')">
Absen Pulang
</button>

<div id="hasil"></div>

<script>

const url =
"https://script.google.com/macros/s/AKfycbz7SDMxpQ-Z5GxHSYsXkduxlhxvEK2lsjM5OseWfgtE6ZMooSHjtXQjTzTnf3GrFWWppg/exec";


// ======================
// LOAD RELAWAN
// ======================

async function loadRelawan(){

  try{

    const response =
      await fetch(url);

    const data =
      await response.json();

    window.relawanData = data;

    // ======================
    // DIVISI UNIK
    // ======================

    const divisiUnik =
      [...new Set(
        data.map(r => r.divisi)
      )];

    const divisiSelect =
      document.getElementById("divisi");

    divisiSelect.innerHTML =
      '<option value="">Pilih Divisi</option>';

    divisiUnik.forEach(divisi => {

      const option =
        document.createElement("option");

      option.value = divisi;
      option.text = divisi;

      divisiSelect.appendChild(option);

    });

  }

  catch(error){

    document.getElementById("hasil")
      .innerHTML =
      "Gagal load relawan";

  }

}
loadRelawan();
document
.getElementById("divisi")
.addEventListener("change", function(){

  const divisiDipilih =
    this.value;

  const namaSelect =
    document.getElementById("nama");

  namaSelect.innerHTML =
    '<option value="">Pilih Nama</option>';

  const filtered =
    window.relawanData.filter(
      r => r.divisi === divisiDipilih
    );

  filtered.forEach(relawan => {

    const option =
      document.createElement("option");

    option.value =
      relawan.nama;

    option.text =
      relawan.nama;

    namaSelect.appendChild(option);

  });

});

// ======================
// ABSEN
// ======================

function absen(status){

  const nama =
    document.getElementById("nama").value;

  const pin =
    document.getElementById("pin").value;

  if(!nama || !pin){

    alert("Nama dan PIN wajib diisi");
    return;

  }

  document.getElementById("hasil")
    .innerHTML =
    "Mengirim data...";


  navigator.geolocation.getCurrentPosition(

    async function(position){

      const lokasi =
        position.coords.latitude +
        "," +
        position.coords.longitude;

      try{

        const response =
          await fetch(url,{

            method:"POST",

            body:JSON.stringify({

              nama:nama,
              pin:pin,
              status:status,
              lokasi:lokasi

            })

          });

        const hasil =
          await response.text();

        document.getElementById("hasil")
          .innerHTML = hasil;

      }

      catch(error){

        document.getElementById("hasil")
          .innerHTML =
          "Gagal kirim data";

      }

    },

    function(error){

      document.getElementById("hasil")
        .innerHTML =
        "GPS tidak diizinkan";

    },

    {
      enableHighAccuracy:true
    }

  );

}

</script>

</body>
</html>
